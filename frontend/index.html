<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Midnight Hoodie Drop</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header class="header">

<p class="drop-label">MIDNIGHT DROP</p>

<h1 class="title">HOODIE COLLECTION</h1>

<div class="countdown">
Drop opens in <span id="timer">00:00:00</span>
</div>

</header>


<section class="product-card">

<div class="image-container">

<img 
src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=400"
class="product-img">

<div id="soldOutOverlay" class="sold-out">
SOLD OUT
</div>

<div class="price-tag">
₹2499
</div>

</div>


<div class="product-info">

<h2>Midnight Classic Hoodie</h2>

<p id="stock" class="stock">
Loading stock...
</p>

</div>


<button id="buyBtn" class="buy-btn">
Reserve Item
</button>


<div id="statusMessage" class="status">

Waiting for drop...

</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
